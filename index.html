<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康卡路里計算助手 (室內外全能版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }
        .card {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .coach-bubble {
            position: relative;
            background: #ffffff;
            border-radius: 1.5rem;
            border-top-left-radius: 0;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .quick-btn { transition: all 0.2s; }
        .quick-btn:active { transform: scale(0.95); }
        
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .tab-active {
            background-color: #10b981;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .exercise-tab-active {
            border-bottom: 3px solid #f97316;
            color: #f97316;
            font-weight: bold;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="guide-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
            <div id="modal-icon" class="text-4xl mb-4 text-center"></div>
            <h3 id="modal-title" class="text-xl font-bold text-center text-slate-800 mb-2"></h3>
            <p id="modal-desc" class="text-slate-600 text-sm leading-relaxed mb-6 bg-slate-50 p-4 rounded-xl"></p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold hover:bg-slate-200 transition text-sm">取消</button>
                <button id="modal-confirm" class="flex-1 py-3 bg-emerald-500 text-white rounded-xl font-bold hover:bg-emerald-600 shadow-lg shadow-emerald-200 transition text-sm">完成記錄</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">健康卡路里助手 <span class="text-emerald-500 text-sm align-top">Outdoor Plus</span></h1>
                <p class="text-slate-500 mt-1">加油 <span id="display-name" class="font-bold text-emerald-600">使用者</span>，今天想在哪裡運動？</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100">
                <span class="text-xs font-bold text-slate-400 block uppercase">今日日期</span>
                <span id="date-now" class="text-sm font-bold text-slate-700"></span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3 space-y-6">
                <section class="card p-6 border-t-4 border-emerald-500">
                    <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center justify-between">
                        <span>我的檔案</span>
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">姓名</label>
                            <input type="text" id="user-name" value="小美" oninput="updateNameDisplay()" class="w-full mt-1 rounded-xl bg-slate-50 p-2 text-sm font-medium">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">性別</label>
                                <select id="gender" onchange="calculateTDEE()" class="w-full mt-1 rounded-xl bg-slate-50 p-2 text-sm font-medium">
                                    <option value="male">男</option>
                                    <option value="female" selected>女</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">年齡</label>
                                <input type="number" id="age" value="25" oninput="calculateTDEE()" class="w-full mt-1 rounded-xl bg-slate-50 p-2 text-sm font-medium">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">體重 (kg)</label>
                                <input type="number" id="weight" value="60" oninput="calculateTDEE()" class="w-full mt-1 rounded-xl bg-slate-50 p-2 text-sm font-medium">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">身高 (cm)</label>
                                <input type="number" id="height" value="160" oninput="calculateTDEE()" class="w-full mt-1 rounded-xl bg-slate-50 p-2 text-sm font-medium">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card overflow-hidden flex flex-col border-l-4 border-orange-500">
                    <div class="flex border-b">
                        <button onclick="switchExerciseTab('indoor')" id="tab-indoor" class="flex-1 py-3 text-xs font-bold exercise-tab-active">🏠 室內運動</button>
                        <button onclick="switchExerciseTab('outdoor')" id="tab-outdoor" class="flex-1 py-3 text-xs font-bold text-slate-400">🌳 室外運動</button>
                    </div>
                    <div class="p-4 flex-grow overflow-y-auto max-h-[500px] hide-scrollbar" id="quick-exercise-grid">
                    </div>
                </section>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <section class="card p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-bold text-slate-800">活動趨勢</h2>
                        <div class="flex bg-slate-100 p-1 rounded-xl text-[10px] font-bold">
                            <button onclick="changeChartPeriod('day')" id="btn-day" class="px-3 py-1.5 rounded-lg transition tab-active">每日</button>
                            <button onclick="changeChartPeriod('week')" id="btn-week" class="px-3 py-1.5 rounded-lg transition text-slate-500">每周</button>
                            <button onclick="changeChartPeriod('month')" id="btn-month" class="px-3 py-1.5 rounded-lg transition text-slate-500">每月</button>
                        </div>
                    </div>
                    <div class="h-64">
                        <canvas id="trendChart"></canvas>
                    </div>
                </section>

                <section class="card p-6 bg-gradient-to-br from-slate-800 to-slate-900 text-white relative">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 text-center">
                            <div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-3xl shadow-lg mx-auto">🧑‍🏫</div>
                            <span id="coach-status" class="mt-2 inline-block px-2 py-0.5 bg-emerald-500/20 text-emerald-400 text-[10px] rounded-full font-bold uppercase">分析中</span>
                        </div>
                        <div class="flex-grow">
                            <h3 class="text-emerald-400 font-bold text-sm mb-1">教練建議</h3>
                            <div class="coach-bubble p-4 text-slate-200 text-sm italic">
                                "<span id="coach-msg">正在分析你的數據...</span>"
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-slate-800">熱量餘額</h2>
                        <div class="text-right">
                            <span class="text-4xl font-black text-slate-800" id="remaining-val">0</span>
                            <span class="text-sm text-slate-400 ml-1">kcal</span>
                        </div>
                    </div>
                    <div class="relative h-4 w-full bg-slate-100 rounded-full overflow-hidden mb-6">
                        <div id="progress-bar" style="width:0%" class="h-full bg-emerald-500 transition-all duration-1000"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="p-3 bg-emerald-50 rounded-2xl">
                            <p class="text-[10px] text-emerald-600 font-bold">目標</p>
                            <p class="text-lg font-black text-emerald-800" id="target-display">0</p>
                        </div>
                        <div class="p-3 bg-blue-50 rounded-2xl">
                            <p class="text-[10px] text-blue-600 font-bold">淨值</p>
                            <p class="text-lg font-black text-blue-800" id="net-display">0</p>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <section class="card flex flex-col h-full max-h-[850px]">
                    <div class="p-5 border-b flex justify-between items-center bg-slate-50/50">
                        <h2 class="font-bold text-slate-800 text-sm">活動日誌</h2>
                        <button onclick="clearAll()" class="text-[10px] text-red-500 font-bold">清空數據</button>
                    </div>
                    
                    <div class="p-4 bg-white space-y-3">
                         <div class="flex gap-2">
                            <input type="text" id="manual-name" placeholder="食物或活動名稱" class="flex-grow rounded-xl bg-slate-100 p-2.5 text-xs">
                            <input type="number" id="manual-cal" placeholder="kcal" class="w-16 rounded-xl bg-slate-100 p-2.5 text-xs font-bold">
                         </div>
                         <div class="flex gap-2">
                            <button onclick="manualAdd('food')" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-[10px] font-bold">＋加飲食</button>
                            <button onclick="manualAdd('exercise')" class="flex-1 bg-orange-500 text-white py-2 rounded-xl text-[10px] font-bold">＋加運動</button>
                         </div>
                         <button onclick="document.getElementById('camera-input').click()" class="w-full py-2.5 bg-slate-800 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2 mt-2">
                            📸 拍攝分析餐點
                         </button>
                         <input type="file" id="camera-input" accept="image/*" class="hidden" onchange="processImage(event)">
                    </div>

                    <div id="ai-loading" class="hidden p-4 text-center">
                        <div class="loading-spinner mx-auto mb-2"></div>
                        <p class="text-[10px] text-emerald-600 font-bold">AI 分析中...</p>
                    </div>

                    <div id="ai-result" class="hidden p-4 bg-emerald-50 mx-4 rounded-xl border border-emerald-100 mb-4">
                        <div class="flex gap-3 mb-2">
                            <img id="preview-img" class="w-12 h-12 object-cover rounded-lg">
                            <div class="flex-grow">
                                <input type="text" id="ai-food-name" class="w-full p-1.5 text-[10px] rounded-lg bg-white font-bold mb-1">
                                <input type="number" id="ai-food-cal" class="w-full p-1.5 text-[10px] rounded-lg bg-white font-black text-emerald-600">
                            </div>
                        </div>
                        <button onclick="addAIResult()" class="w-full bg-emerald-500 text-white text-[10px] py-2 rounded-lg font-bold">確認加入</button>
                    </div>

                    <ul id="log-list" class="flex-grow overflow-y-auto divide-y divide-slate-50 border-t"></ul>
                </section>
            </div>
        </div>
    </div>

    <script>
        let tdee = 1800;
        let logs = [];
        let trendChart = null;
        let currentPeriod = 'day';
        let currentExerciseTab = 'indoor';
        const apiKey = ""; 

        const exercises = {
            indoor: [
                { id: 'burpee', name: '波比跳 50下', met: 11.0, duration: 0.15, icon: '🔥', desc: '全方位燃脂之王。' },
                { id: 'hiit', name: '開合跳 100下', met: 8.0, duration: 0.08, icon: '✨', desc: '快速有氧。' },
                { id: 'jog_place', name: '原地慢跑 20分鐘', met: 6.0, duration: 0.33, icon: '👣', desc: '室內基礎有氧。' },
                { id: 'squat', name: '深蹲 60下', met: 5.0, duration: 0.1, icon: '🦵', desc: '強化下肢。' },
                { id: 'plank', name: '平板支撐 3分鐘', met: 4.0, duration: 0.05, icon: '🧘', desc: '核心訓練。' },
                { id: 'pushup', name: '伏地挺身 40下', met: 4.0, duration: 0.1, icon: '💪', desc: '胸肌訓練。' }
            ],
            outdoor: [
                { id: 'run', name: '戶外慢跑 30分鐘', met: 8.0, duration: 0.5, icon: '🏃', desc: '經典戶外有氧。' },
                { id: 'cycle', name: '單車騎行 1小時', met: 7.5, duration: 1.0, icon: '🚴', desc: '欣賞風景的好運動。' },
                { id: 'walk', name: '快步健走 45分鐘', met: 4.5, duration: 0.75, icon: '🚶', desc: '輕鬆消脂。' },
                { id: 'basketball', name: '投籃半場 40分鐘', met: 6.0, duration: 0.66, icon: '🏀', desc: '趣味競技。' },
                { id: 'swim', name: '戶外游泳 30分鐘', met: 9.0, duration: 0.5, icon: '🏊', desc: '塑形首選。' },
                { id: 'hiking', name: '登山/爬坡 1小時', met: 7.0, duration: 1.0, icon: '⛰️', desc: '極佳心肺訓練。' },
                { id: 'tennis', name: '網球單打 45分鐘', met: 8.0, duration: 0.75, icon: '🎾', desc: '爆發力練習。' },
                { id: 'climbing', name: '戶外攀岩 1小時', met: 8.0, duration: 1.0, icon: '🧗', desc: '核心挑戰。' },
                { id: 'soccer', name: '室外踢球 30分鐘', met: 10.0, duration: 0.5, icon: '⚽', desc: '高強度衝刺。' },
                { id: 'yoga_park', name: '公園伸展 30分鐘', met: 2.5, duration: 0.5, icon: '🌳', desc: '放鬆身心。' }
            ]
        };

        window.onload = () => {
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            
            const savedSettings = localStorage.getItem('cal_tracker_settings_v7');
            if (savedSettings) {
                const s = JSON.parse(savedSettings);
                document.getElementById('user-name').value = s.name || '小美';
                document.getElementById('gender').value = s.gender || 'female';
                document.getElementById('weight').value = s.weight || 60;
                document.getElementById('height').value = s.height || 160;
                document.getElementById('age').value = s.age || 25;
            }

            const savedLogs = localStorage.getItem('cal_tracker_all_logs_v7');
            if (savedLogs) logs = JSON.parse(savedLogs);

            initChart();
            updateNameDisplay();
            calculateTDEE();
        };

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [
                    { label: '攝取', backgroundColor: '#3b82f6', borderRadius: 6, data: [] },
                    { label: '消耗', backgroundColor: '#f97316', borderRadius: 6, data: [] }
                ]},
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#f1f5f9' }, 
                            ticks: { 
                                font: { size: 10 },
                                stepSize: 100 // 設定 100, 200, 300 顯示
                            } 
                        },
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        function calculateTDEE() {
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value) || 60;
            const height = parseFloat(document.getElementById('height').value) || 160;
            const age = parseInt(document.getElementById('age').value) || 25;
            let bmr = (gender === 'male') ? (10 * weight + 6.25 * height - 5 * age + 5) : (10 * weight + 6.25 * height - 5 * age - 161);
            tdee = Math.round(bmr * 1.55);
            document.getElementById('target-display').innerText = tdee;
            renderExerciseButtons();
            saveData();
            updateUI();
        }

        function switchExerciseTab(tab) {
            currentExerciseTab = tab;
            document.getElementById('tab-indoor').className = tab === 'indoor' ? 'flex-1 py-3 text-xs font-bold exercise-tab-active' : 'flex-1 py-3 text-xs font-bold text-slate-400';
            document.getElementById('tab-outdoor').className = tab === 'outdoor' ? 'flex-1 py-3 text-xs font-bold exercise-tab-active' : 'flex-1 py-3 text-xs font-bold text-slate-400';
            renderExerciseButtons();
        }

        function renderExerciseButtons() {
            const weight = parseFloat(document.getElementById('weight').value) || 60;
            const grid = document.getElementById('quick-exercise-grid');
            grid.innerHTML = '';
            exercises[currentExerciseTab].forEach(ex => {
                const kcal = Math.round(ex.met * weight * ex.duration);
                const btn = document.createElement('button');
                btn.onclick = () => showGuide(ex, kcal);
                btn.className = 'quick-btn flex items-center justify-between p-3 bg-slate-50 rounded-xl hover:bg-orange-50 transition mb-2 w-full border border-slate-100';
                btn.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-xl mr-3">${ex.icon}</span>
                        <div class="text-left">
                            <p class="text-[10px] font-bold text-slate-700">${ex.name}</p>
                            <p class="text-[9px] text-orange-500 font-black">-${kcal} kcal</p>
                        </div>
                    </div>`;
                grid.appendChild(btn);
            });
        }

        function showGuide(ex, kcal) {
            document.getElementById('modal-icon').innerText = ex.icon;
            document.getElementById('modal-title').innerText = ex.name;
            document.getElementById('modal-desc').innerText = ex.desc;
            document.getElementById('modal-confirm').onclick = () => {
                addLog(ex.name, kcal, 'exercise');
                closeModal();
            };
            document.getElementById('guide-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('guide-modal').classList.add('hidden'); }

        function addLog(name, cal, type) {
            logs.push({ id: Date.now(), name, cal, type, timestamp: new Date().toISOString() });
            saveData(); updateUI();
        }

        function manualAdd(type) {
            const name = document.getElementById('manual-name').value;
            const cal = parseInt(document.getElementById('manual-cal').value);
            if (name && !isNaN(cal)) {
                addLog(name, cal, type);
                document.getElementById('manual-name').value = '';
                document.getElementById('manual-cal').value = '';
            }
        }

        function deleteItem(id) {
            logs = logs.filter(l => l.id !== Number(id));
            saveData(); updateUI();
        }

        function clearAll() { if(confirm('要刪除所有數據嗎？')) { logs = []; saveData(); updateUI(); } }

        function updateUI() {
            const list = document.getElementById('log-list');
            list.innerHTML = '';
            const todayStr = new Date().toDateString();
            const todayLogs = logs.filter(l => new Date(l.timestamp).toDateString() === todayStr);
            
            let foodTotal = 0, exTotal = 0;
            todayLogs.sort((a, b) => b.id - a.id).forEach(log => {
                if (log.type === 'food') foodTotal += log.cal; else exTotal += log.cal;
                const li = document.createElement('li');
                li.className = 'p-4 flex justify-between items-center bg-white hover:bg-slate-50 transition';
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-lg">${log.type === 'food' ? '🍲' : '🏃'}</span>
                        <div>
                            <p class="text-[10px] font-bold text-slate-700">${log.name}</p>
                            <p class="text-[8px] text-slate-400">${new Date(log.id).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-black ${log.type === 'food' ? 'text-blue-500' : 'text-orange-500'}">${log.type === 'food' ? '+' : '-'}${log.cal}</span>
                        <button onclick="deleteItem(${log.id})" class="text-slate-300 hover:text-red-500">×</button>
                    </div>`;
                list.appendChild(li);
            });

            const net = foodTotal - exTotal;
            document.getElementById('remaining-val').innerText = tdee - net;
            document.getElementById('net-display').innerText = net;
            const progress = Math.min((net / tdee) * 100, 100);
            document.getElementById('progress-bar').style.width = Math.max(progress, 0) + "%";
            document.getElementById('progress-bar').className = `h-full transition-all duration-1000 ${net > tdee ? 'bg-red-500' : 'bg-emerald-500'}`;

            updateChartData();
            updateCoachFeedback(net);
        }

        function updateChartData() {
            let labels = [], foodData = [], exData = [];
            const now = new Date();
            
            if (currentPeriod === 'day') {
                labels = ['00:00', '06:00', '12:00', '18:00', '23:59'];
                foodData = [0, 0, 0, 0, 0]; exData = [0, 0, 0, 0, 0];
                logs.filter(l => new Date(l.timestamp).toDateString() === now.toDateString()).forEach(l => {
                    const idx = Math.min(Math.floor(new Date(l.timestamp).getHours() / 5), 4);
                    if(l.type === 'food') foodData[idx] += l.cal; else exData[idx] += l.cal;
                });
            } else if (currentPeriod === 'week') {
                for(let i=6; i>=0; i--) {
                    const d = new Date(); d.setDate(now.getDate() - i);
                    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
                    let fSum = 0, eSum = 0;
                    logs.filter(l => new Date(l.timestamp).toDateString() === d.toDateString()).forEach(l => {
                        if(l.type === 'food') fSum += l.cal; else eSum += l.cal;
                    });
                    foodData.push(fSum); exData.push(eSum);
                }
            } else if (currentPeriod === 'month') {
                // 每 5 天為一個區間，顯示過去 30 天
                for(let i=5; i>=0; i--) {
                    const dStart = new Date(); dStart.setDate(now.getDate() - (i * 5 + 4));
                    const dEnd = new Date(); dEnd.setDate(now.getDate() - (i * 5));
                    labels.push(`${dStart.getDate()}-${dEnd.getDate()}`);
                    let fSum = 0, eSum = 0;
                    logs.forEach(l => {
                        const lDate = new Date(l.timestamp);
                        if (lDate >= dStart && lDate <= dEnd) {
                            if(l.type === 'food') fSum += l.cal; else eSum += l.cal;
                        }
                    });
                    foodData.push(fSum); exData.push(eSum);
                }
            }
            
            trendChart.data.labels = labels;
            trendChart.data.datasets[0].data = foodData;
            trendChart.data.datasets[1].data = exData;
            trendChart.update();
        }

        function changeChartPeriod(p) {
            currentPeriod = p;
            document.getElementById('btn-day').className = p === 'day' ? 'px-3 py-1.5 rounded-lg transition tab-active' : 'px-3 py-1.5 rounded-lg transition text-slate-500';
            document.getElementById('btn-week').className = p === 'week' ? 'px-3 py-1.5 rounded-lg transition tab-active' : 'px-3 py-1.5 rounded-lg transition text-slate-500';
            document.getElementById('btn-month').className = p === 'month' ? 'px-3 py-1.5 rounded-lg transition tab-active' : 'px-3 py-1.5 rounded-lg transition text-slate-500';
            updateUI();
        }

        function updateCoachFeedback(net) {
            const msg = net > tdee ? `熱量超標了！出去快步健走或慢跑 30 分鐘吧！` : `表現優異，今天的卡路里控制得很好。`;
            document.getElementById('coach-msg').innerText = msg;
            document.getElementById('coach-status').innerText = net > tdee ? "警告" : "良好";
        }

        async function processImage(event) {
            const file = event.target.files[0]; if (!file) return;
            document.getElementById('ai-loading').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = (e) => analyzeWithAI(e.target.result.split(',')[1]);
            reader.readAsDataURL(file);
        }

        async function analyzeWithAI(base64) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "辨識食物名稱及熱量。JSON：{\"food\": \"\", \"calories\": 數字}" }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const d = await res.json();
                const r = JSON.parse(d.candidates[0].content.parts[0].text);
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-result').classList.remove('hidden');
                document.getElementById('ai-food-name').value = r.food;
                document.getElementById('ai-food-cal').value = r.calories;
                document.getElementById('preview-img').src = `data:image/jpeg;base64,${base64}`;
            } catch (e) { document.getElementById('ai-loading').classList.add('hidden'); }
        }

        function addAIResult() {
            addLog(document.getElementById('ai-food-name').value, parseInt(document.getElementById('ai-food-cal').value), 'food');
            document.getElementById('ai-result').classList.add('hidden');
        }

        function saveData() {
            const s = { name: document.getElementById('user-name').value, gender: document.getElementById('gender').value, weight: document.getElementById('weight').value, height: document.getElementById('height').value, age: document.getElementById('age').value };
            localStorage.setItem('cal_tracker_settings_v7', JSON.stringify(s));
            localStorage.setItem('cal_tracker_all_logs_v7', JSON.stringify(logs));
        }

        function updateNameDisplay() { document.getElementById('display-name').innerText = document.getElementById('user-name').value || "使用者"; saveData(); }
    </script>
</body>
</html>

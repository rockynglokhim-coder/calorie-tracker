<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康卡路里計算助手 (AI 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">健康卡路里計算助手 <span class="text-emerald-500 text-sm align-top">AI</span></h1>
            <p class="text-slate-500 mt-2">拍照或選取照片，AI 自動計算熱量</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左側：設定與狀態 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- TDEE 設定 -->
                <section class="card p-6">
                    <h2 class="text-lg font-semibold mb-4 text-emerald-600 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        個人設定 (TDEE)
                    </h2>
                    <div class="space-y-3 text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-slate-500">性別</label>
                                <select id="gender" class="w-full mt-1 rounded-md border-slate-200 bg-slate-50 p-2">
                                    <option value="male">男性</option>
                                    <option value="female" selected>女性</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-slate-500">年齡</label>
                                <input type="number" id="age" value="25" class="w-full mt-1 rounded-md border-slate-200 bg-slate-50 p-2">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-slate-500">體重 (kg)</label>
                                <input type="number" id="weight" value="60" class="w-full mt-1 rounded-md border-slate-200 bg-slate-50 p-2">
                            </div>
                            <div>
                                <label class="text-slate-500">身高 (cm)</label>
                                <input type="number" id="height" value="160" class="w-full mt-1 rounded-md border-slate-200 bg-slate-50 p-2">
                            </div>
                        </div>
                        <div>
                            <label class="text-slate-500">活動量</label>
                            <select id="activity" class="w-full mt-1 rounded-md border-slate-200 bg-slate-50 p-2">
                                <option value="1.2">久坐</option>
                                <option value="1.375">輕量運動</option>
                                <option value="1.55" selected>中度運動</option>
                                <option value="1.725">重度運動</option>
                            </select>
                        </div>
                        <button onclick="calculateTDEE()" class="w-full bg-emerald-500 text-white py-2 rounded-lg font-medium mt-2 hover:bg-emerald-600 transition">更新設定</button>
                    </div>
                </section>

                <!-- 今日目標 -->
                <div class="card p-6 bg-emerald-600 text-white">
                    <h3 class="text-xs font-bold opacity-80 uppercase tracking-widest">今日目標熱量</h3>
                    <div class="mt-1 flex items-baseline">
                        <span class="text-4xl font-black" id="target-display">1800</span>
                        <span class="ml-1 opacity-80">kcal</span>
                    </div>
                </div>

                <!-- 手動加入功能 -->
                <section class="card p-6">
                    <h2 class="text-lg font-semibold mb-4 text-orange-500 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        手動紀錄
                    </h2>
                    <div class="space-y-3 text-sm">
                        <input type="text" id="manual-name" placeholder="項目名稱 (如：跑步、漢堡)" class="w-full rounded-md border-slate-200 bg-slate-50 p-2">
                        <input type="number" id="manual-cal" placeholder="熱量 (kcal)" class="w-full rounded-md border-slate-200 bg-slate-50 p-2">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="manualAdd('food')" class="bg-blue-500 text-white py-2 rounded-lg font-medium hover:bg-blue-600">＋飲食</button>
                            <button onclick="manualAdd('exercise')" class="bg-orange-500 text-white py-2 rounded-lg font-medium hover:bg-orange-600">－運動</button>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 右側：AI 拍照與紀錄 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- AI 辨識區 -->
                <section class="card p-6 border-2 border-dashed border-emerald-200 bg-emerald-50/30">
                    <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center">
                        <svg class="w-6 h-6 mr-2 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        AI 食物辨識 (相機/相簿)
                    </h2>
                    
                    <div class="flex flex-col items-center justify-center p-4">
                        <!-- 移除 capture 屬性以允許從相簿選取 -->
                        <input type="file" id="camera-input" accept="image/*" class="hidden" onchange="processImage(event)">
                        <button onclick="document.getElementById('camera-input').click()" class="bg-emerald-500 text-white px-8 py-4 rounded-full font-bold shadow-lg hover:bg-emerald-600 transform active:scale-95 transition flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                            <span>拍照或從相簿選取</span>
                        </button>
                        <p class="text-xs text-slate-400 mt-3 text-center">支援直接拍照或上傳相簿照片</p>
                    </div>

                    <div id="ai-loading" class="hidden flex flex-col items-center py-6">
                        <div class="loading-spinner mb-2"></div>
                        <p class="text-emerald-600 font-medium animate-pulse">AI 正在分析食物...</p>
                    </div>

                    <div id="ai-result" class="hidden mt-4 p-4 bg-white rounded-xl border border-emerald-100 shadow-inner">
                        <div class="flex gap-4">
                            <img id="preview-img" class="w-24 h-24 object-cover rounded-lg border">
                            <div class="flex-grow space-y-2">
                                <div class="flex gap-2">
                                    <input type="text" id="ai-food-name" class="flex-grow p-2 text-sm border rounded bg-slate-50 font-bold">
                                    <input type="number" id="ai-food-cal" class="w-24 p-2 text-sm border rounded bg-slate-50 font-bold text-emerald-600">
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="addAIResult()" class="flex-grow bg-emerald-500 text-white text-sm py-2 rounded font-bold hover:bg-emerald-600">確認加入紀錄</button>
                                    <button onclick="resetAI()" class="px-4 bg-slate-100 text-slate-400 text-sm py-2 rounded hover:bg-slate-200">取消</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 進度條 -->
                <section class="card p-6">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">今日熱量進度</h2>
                            <p class="text-sm text-slate-400" id="date-now"></p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs text-slate-400 block mb-1">剩餘熱量</span>
                            <span class="text-2xl font-black text-slate-700" id="remaining-val">1800</span>
                            <span class="text-xs text-slate-400 ml-1">kcal</span>
                        </div>
                    </div>
                    
                    <div class="relative h-4 w-full bg-slate-100 rounded-full overflow-hidden mb-6">
                        <div id="progress-bar" style="width:0%" class="h-full bg-emerald-500 transition-all duration-700 ease-out"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-3 bg-blue-50 rounded-xl">
                            <p class="text-[10px] text-blue-500 font-bold uppercase">飲食攝取 (+)</p>
                            <p class="text-xl font-bold text-blue-700" id="food-total">0 <span class="text-xs opacity-60">kcal</span></p>
                        </div>
                        <div class="p-3 bg-orange-50 rounded-xl">
                            <p class="text-[10px] text-orange-500 font-bold uppercase">運動消耗 (-)</p>
                            <p class="text-xl font-bold text-orange-700" id="exercise-total">0 <span class="text-xs opacity-60">kcal</span></p>
                        </div>
                    </div>
                </section>

                <!-- 清單 -->
                <section class="card overflow-hidden">
                    <div class="p-4 bg-slate-50/80 border-b flex justify-between items-center">
                        <h2 class="font-bold text-slate-700">紀錄清單</h2>
                        <button onclick="clearAll()" class="text-xs text-red-400 font-medium hover:text-red-600">清除全部</button>
                    </div>
                    <ul id="log-list" class="divide-y divide-slate-100 max-h-80 overflow-y-auto"></ul>
                </section>
            </div>
        </div>
    </div>

    <script>
        let tdee = 1800;
        let logs = [];
        const apiKey = ""; // API Key 會在運行時注入

        window.onload = () => {
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' });
            
            const savedSettings = localStorage.getItem('cal_tracker_settings');
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                document.getElementById('gender').value = settings.gender;
                document.getElementById('weight').value = settings.weight;
                document.getElementById('height').value = settings.height;
                document.getElementById('age').value = settings.age;
                document.getElementById('activity').value = settings.activity;
            }

            const lastDate = localStorage.getItem('cal_tracker_date');
            const todayDate = new Date().toDateString();
            if (lastDate === todayDate) {
                const savedLogs = localStorage.getItem('cal_tracker_logs');
                if (savedLogs) logs = JSON.parse(savedLogs);
            } else {
                localStorage.setItem('cal_tracker_date', todayDate);
                localStorage.setItem('cal_tracker_logs', JSON.stringify([]));
            }

            calculateTDEE();
            updateUI();
        };

        function calculateTDEE() {
            const gender = document.getElementById('gender').value;
            const weight = parseFloat(document.getElementById('weight').value) || 60;
            const height = parseFloat(document.getElementById('height').value) || 160;
            const age = parseInt(document.getElementById('age').value) || 25;
            const activity = parseFloat(document.getElementById('activity').value);

            let bmr = (gender === 'male') 
                ? (10 * weight + 6.25 * height - 5 * age + 5)
                : (10 * weight + 6.25 * height - 5 * age - 161);

            tdee = Math.round(bmr * activity);
            document.getElementById('target-display').innerText = tdee;
            saveData();
            updateUI();
        }

        function saveData() {
            const settings = {
                gender: document.getElementById('gender').value,
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                age: document.getElementById('age').value,
                activity: document.getElementById('activity').value
            };
            localStorage.setItem('cal_tracker_settings', JSON.stringify(settings));
            localStorage.setItem('cal_tracker_logs', JSON.stringify(logs));
        }

        async function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-result').classList.add('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxSide = 800; // 壓縮長邊至 800px 以利辨識並減少負載
                    if (width > height && width > maxSide) { height *= maxSide / width; width = maxSide; }
                    else if (height > maxSide) { width *= maxSide / height; height = maxSide; }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('preview-img').src = compressedBase64;
                    analyzeWithAI(compressedBase64.split(',')[1]);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function analyzeWithAI(base64Image) {
            const systemPrompt = "你是一個專業營養師。請分析這張食物照片，估算其食物名稱和總熱量(kcal)。請只回傳 JSON 格式：{\"food\": \"食物名稱\", \"calories\": 數字}。若無法辨識，請回傳猜測值。";
            
            let retries = 0;
            const maxRetries = 5;

            const callAPI = async () => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "辨識圖中食物並提供卡路里" },
                                    { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);
                    const data = await response.json();
                    const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textResult) throw new Error("AI 未能產生內容");
                    
                    const result = JSON.parse(textResult);
                    document.getElementById('ai-loading').classList.add('hidden');
                    document.getElementById('ai-result').classList.remove('hidden');
                    document.getElementById('ai-food-name').value = result.food;
                    document.getElementById('ai-food-cal').value = result.calories;

                } catch (error) {
                    if (retries < maxRetries) {
                        retries++;
                        setTimeout(callAPI, Math.pow(2, retries) * 1000);
                    } else {
                        document.getElementById('ai-loading').classList.add('hidden');
                        alert("分析失敗，請重試或手動輸入。原因: " + error.message);
                    }
                }
            };
            callAPI();
        }

        function manualAdd(type) {
            const nameInput = document.getElementById('manual-name');
            const calInput = document.getElementById('manual-cal');
            const name = nameInput.value || (type === 'food' ? '未命名飲食' : '未命名運動');
            const cal = parseInt(calInput.value);
            if (!isNaN(cal)) {
                logs.push({ id: Date.now(), name, cal, type });
                nameInput.value = '';
                calInput.value = '';
                saveData();
                updateUI();
            } else {
                alert('請輸入熱量數值');
            }
        }

        function addAIResult() {
            const name = document.getElementById('ai-food-name').value;
            const cal = parseInt(document.getElementById('ai-food-cal').value);
            if (name && !isNaN(cal)) {
                logs.push({ id: Date.now(), name, cal, type: 'food' });
                resetAI();
                saveData();
                updateUI();
            }
        }

        function resetAI() {
            document.getElementById('ai-result').classList.add('hidden');
            document.getElementById('camera-input').value = '';
        }

        function deleteItem(id) {
            logs = logs.filter(log => log.id !== id);
            saveData();
            updateUI();
        }

        function clearAll() {
            if(confirm('確定要清空今日紀錄？')) {
                logs = [];
                saveData();
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('log-list');
            list.innerHTML = '';
            let foodTotal = 0;
            let exerciseTotal = 0;

            logs.forEach(log => {
                const isFood = log.type === 'food';
                if (isFood) foodTotal += log.cal;
                else exerciseTotal += log.cal;

                const li = document.createElement('li');
                li.className = 'p-4 flex justify-between items-center group';
                li.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center ${isFood ? 'bg-blue-100' : 'bg-orange-100'} mr-3">
                            ${isFood ? '🍲' : '🔥'}
                        </div>
                        <p class="font-medium text-slate-700">${log.name}</p>
                    </div>
                    <div class="flex items-center">
                        <span class="font-bold ${isFood ? 'text-blue-600' : 'text-orange-600'} mr-4">
                            ${isFood ? '+' : '-'}${log.cal}
                        </span>
                        <button onclick="deleteItem(${log.id})" class="text-slate-300 hover:text-red-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                list.prepend(li);
            });

            const net = foodTotal - exerciseTotal;
            const remaining = tdee - net;
            document.getElementById('food-total').innerText = foodTotal;
            document.getElementById('exercise-total').innerText = exerciseTotal;
            document.getElementById('remaining-val').innerText = remaining;
            document.getElementById('progress-bar').style.width = Math.min((net / tdee) * 100, 100) + "%";
            if (net > tdee) document.getElementById('progress-bar').classList.replace('bg-emerald-500', 'bg-red-500');
            else document.getElementById('progress-bar').classList.replace('bg-red-500', 'bg-emerald-500');
        }
    </script>
</body>
</html>
